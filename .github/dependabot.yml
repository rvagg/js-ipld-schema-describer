version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
    cooldown:
      default-days: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    cooldown:
      default-days: 5
    commit-message:
      prefix: 'chore'
      include: 'scope'
  - package-ecosystem: 'npm'
    directory: '/examples/'
    schedule:
      interval: 'monthly'
    cooldown:
      default-days: 5
    ignore:
      - dependency-name: "@ipld/car"
    commit-message:
      prefix: 'chore'
      include: 'scope'
